<svg viewBox="0 0 210 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Double reel icon, scaled 2x from 44x24 to 88x48 -->
  <g transform="scale(2)">
    <!-- Left reel -->
    <circle cx="11" cy="12" r="9" stroke="#e50914" stroke-width="1.5"/>
    <circle cx="11" cy="12" r="3" fill="#e50914"/>
    <circle cx="11" cy="2.2" r="1.3" fill="#e50914"/>
    <circle cx="11" cy="21.8" r="1.3" fill="#e50914"/>
    <circle cx="1.3" cy="12" r="1.3" fill="#e50914"/>
    <!-- Right reel -->
    <circle cx="33" cy="12" r="9" stroke="#e50914" stroke-width="1.5"/>
    <circle cx="33" cy="12" r="3" fill="#e50914"/>
    <circle cx="33" cy="2.2" r="1.3" fill="#e50914"/>
    <circle cx="33" cy="21.8" r="1.3" fill="#e50914"/>
    <circle cx="42.7" cy="12" r="1.3" fill="#e50914"/>
  </g>
  <!-- Wordmark: x=96 (88px icon + 8px gap) -->
  <text y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28">
    <tspan x="96" font-weight="300" fill="#e0e0ec">Reel</tspan><tspan font-weight="700" fill="#e50914">Two</tspan>
  </text>
</svg>
